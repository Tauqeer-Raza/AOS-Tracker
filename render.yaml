services:
  - type: web
    name: aos-tracker-web
    runtime: node
    plan: starter
    region: oregon
    healthCheckPath: /api/health
    buildCommand: npm install && npm run install:all && npm run build
    preDeployCommand: npm run db:prepare
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: aos-tracker-db
          property: connectionString
      - key: DB_DIALECT
        value: postgres
      - key: DB_SSL
        value: "false"
      - key: SYNC_DATABASE
        value: "true"
      - key: AUTO_SEED
        value: "false"
      - key: FORCE_SEED
        value: "false"
      - key: FRONTEND_DIST
        value: client/dist
      - key: SEED_FILE_PATH
        value: ./data/AOS_Sample_Dataset_v3_Max_4_Projects(1).xlsx

databases:
  - name: aos-tracker-db
    plan: basic-256mb
    region: oregon
    databaseName: aos_tracker
    postgresMajorVersion: "17"
